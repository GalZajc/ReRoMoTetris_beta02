<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Tetris</title>
    <style>
        /* Base Styles */
        html, body {
            height: 100%; /* Ensure html and body take full height */
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
        }
        body {
            display: flex;
            justify-content: center; /* Center main content horizontally */
            align-items: center; /* Center main content vertically */
            background-color: #222;
            color: #eee;
            font-family: sans-serif;
        }

        /* Main Layout Container */
        #uiContainer {
             position: relative; /* Needed for absolute positioning of controls */
             display: flex;
             align-items: flex-start; /* Align canvas and info top */
             gap: 25px; /* Space between canvas and info panel */
             /* Height will be controlled by content (primarily the canvas set by JS) */
             /* Max height can be set by JS if needed, but start without */
        }

        /* Game Canvas */
        canvas#gameCanvas {
            /* Sizing (width, height) will be set by JavaScript */
            border: 1px solid #555;
            background-color: #000;
            display: block; /* Prevents extra space below canvas */
            /* aspect-ratio: 1 / 1; */ /* JS will enforce this by setting equal width/height */
        }

        /* Settings Panel Placeholder (Button) */
        #settingsToggleContainer {
            position: fixed; /* Position relative to viewport */
            top: 15px;
            left: 15px;
            z-index: 100;
        }
        #settingsToggleButton {
             padding: 8px 12px;
             font-size: 18px;
             cursor: pointer;
             background-color: #444;
             border: 1px solid #666;
             color: #eee;
             border-radius: 5px;
        }
         #settingsToggleButton:hover {
             background-color: #555;
         }

        /* Info Panel (Right Side) */
        #info {
            width: 220px; /* Keep fixed width */
            display: flex;
            gap: 15px; /* Space between the two columns */
            align-items: flex-start;
            height: 100%; /* Allow info panel to take available height if needed */
            box-sizing: border-box;
        }

        .info-column {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Vertical space between items in a column */
            flex: 1; /* Each column takes equal space */
        }

        /* Score & Lines Display */
        .info-box {
            background-color: #333; /* Subtle background */
            padding: 5px 8px;
            border-radius: 3px;
        }
        .info-box p {
            margin: 2px 0;
            font-size: 0.95em; /* Slightly smaller font */
        }
        .info-box span {
            font-weight: bold;
            float: right; /* Align numbers to the right */
            min-width: 30px; /* Ensure space for numbers */
            text-align: right;
        }

        /* Hold & Next Piece Previews */
        .previewContainer {
            border: 1px solid #444;
            padding: 5px;
            background-color: #2a2a2a; /* Slightly different background */
            border-radius: 3px;
            width: 100%; /* Take full width of column */
            box-sizing: border-box; /* Include padding/border in width */
        }
        .previewContainer h4 {
             margin: 0 0 8px 0;
             font-size: 0.9em;
             text-align: center;
             color: #aaa;
             font-weight: normal;
        }
        .previewCanvas {
             background-color: #111;
             width: 100%; /* Make preview canvas responsive within its column */
             /* Height is determined by aspect-ratio */
             display: block;
             margin: 0 auto;
             border: 1px solid #333;
             aspect-ratio: 1 / 1 !important; /* CSS aspect ratio */
        }

         /* Game Over / Restart Area - Now empty */
         #gameStatusContainer {
             margin-top: 15px;
             text-align: center;
             grid-column: 1 / -1; /* Span both columns if using grid later */
             /* No button needed here anymore */
             min-height: 40px; /* Reserve some space */
         }

        /* Controls Table (Positioned by JS) */
        #controlsContainer {
            position: absolute; /* Position relative to #uiContainer */
            /* top and left are set by JavaScript */
            background-color: rgba(40, 40, 40, 0.85);
            border: 1px solid #666;
            padding: 10px 15px;
            border-radius: 5px;
            color: #eee;
            font-size: 0.9em;
            z-index: 20;
            width: max-content; /* Adjust width to content */
        }
        #controlsContainer table { border-collapse: collapse; }
        #controlsContainer td {
            padding: 3px 8px;
            border: 1px solid #555;
            text-align: left;
        }
         #controlsContainer td:first-child {
             font-weight: bold;
             text-align: center;
             min-width: 40px;
         }
         #controlsContainer p {
             margin: 0 0 8px 0;
             font-size: 0.85em;
             text-align: center;
             color: #ccc; /* Brighter than before */
             font-weight: bold;
         }

         /* Pause/Game Over Message (Drawn on Canvas) */
         /* No specific CSS needed */


         /* Settings Modal Styles (Keep as is, structure below adds new item) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #2a2a2a;
            padding: 25px;
            border: 1px solid #555;
            width: 90%;
            max-width: 550px; /* Limit modal width */
            max-height: 90vh; /* Limit modal height */
            overflow-y: auto;
            color: #eee;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .modal-content h2 {
            margin-top: 0;
            text-align: center;
            color: #4CAF50; /* Header color */
        }
        .modal-close-button {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-close-button:hover { color: #fff; }

        .settings-section {
            margin-bottom: 25px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
        }
        .settings-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .settings-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #ddd;
            font-size: 1.1em;
            border-left: 3px solid #4CAF50;
            padding-left: 8px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* Responsive grid */
            gap: 15px;
        }
        .settings-item {
            display: flex;
            flex-direction: column; /* Stack label and input */
        }
        .settings-item label {
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #ccc;
        }
        .settings-item input[type="number"],
        .settings-item input[type="text"],
        .settings-item input[type="color"] {
            padding: 8px;
            background-color: #383838;
            border: 1px solid #555;
            color: #eee;
            border-radius: 4px;
            width: 100%; /* Take full width */
            box-sizing: border-box;
        }
         .settings-item input[type="text"] {
             text-align: center;
             font-weight: bold;
             cursor: pointer;
         }
          .settings-item input[type="text"].listening {
              background-color: #4CAF50;
              color: white;
          }
           .settings-item input[type="color"] {
              padding: 2px; /* Reduce padding for color input */
              height: 35px; /* Match height */
           }

        .settings-actions {
            margin-top: 20px;
            text-align: center;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .settings-actions button {
            padding: 10px 18px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            background-color: #4A90E2; /* Blue */
            color: white;
            transition: background-color 0.3s;
        }
        .settings-actions button:hover {
            opacity: 0.9;
        }
        .settings-actions button.save { background-color: #4CAF50; } /* Green */
        .settings-actions button.cancel { background-color: #f44336; } /* Red */

    </style>
</head>
<body>

    <!-- Settings Toggle Button -->
    <div id="settingsToggleContainer">
        <button id="settingsToggleButton" title="Settings">⚙️ Settings</button>
    </div>

    <!-- Main UI Layout -->
    <div id="uiContainer"> <!-- Added position:relative in CSS -->
        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Info Panel -->
        <div id="info">
            <!-- Column 1: Hold & Score -->
            <div class="info-column">
                <div class="previewContainer">
                     <h4>HOLD (U)</h4>
                     <canvas id="holdCanvas" class="previewCanvas"></canvas>
                </div>
                <div class="info-box" id="scoreBoard">
                    <p>Score: <span id="scoreValue">0</span></p>
                    <p>High: <span id="highScoreValue">0</span></p>
                </div>
                 <div class="info-box" id="linesBoard">
                     <p>Lines: <span id="linesValue">0</span></p>
                     <p>High: <span id="highLinesValue">0</span></p>
                 </div>
                 <!-- Game Over / Restart Area (Now Empty) -->
                 <div id="gameStatusContainer">
                    <!-- Button removed -->
                 </div>
            </div>
            <!-- Column 2: Next Pieces -->
            <div class="info-column">
                <div class="previewContainer">
                     <h4>NEXT</h4>
                     <canvas id="nextCanvas1" class="previewCanvas"></canvas>
                </div>
                 <div class="previewContainer">
                      <!-- No title needed for the second next box -->
                     <canvas id="nextCanvas2" class="previewCanvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Controls Table Container (Positioned by JS relative to uiContainer) -->
        <div id="controlsContainer">
             <p>CONTROLS (Remapable In Settings)</p> <!-- Text Changed -->
             <!-- Table generated by JS -->
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="modal-close-button">×</span>
            <h2>Settings</h2>

            <!-- Movement Settings -->
            <div class="settings-section">
                <h3>Movement</h3>
                <div class="settings-grid">
                    <div class="settings-item">
                        <label for="setting-das">DAS (ms)</label>
                        <input type="number" id="setting-das" min="0" step="10">
                    </div>
                    <div class="settings-item">
                        <label for="setting-arr">ARR (ms)</label>
                        <input type="number" id="setting-arr" min="0" step="5">
                    </div>
                    <div class="settings-item">
                        <label for="setting-quickMotionMultiplier">Quick Motion Multiplier (×)</label>
                        <input type="number" id="setting-quickMotionMultiplier" min="1" step="0.5">
                    </div>
                    <div class="settings-item">
                        <label for="setting-softDrop">Soft Drop Speed (Multiplier)</label>
                        <input type="number" id="setting-softDrop" min="1" step="1">
                    </div>
                    <div class="settings-item">
                      <label for="setting-comboTime">Combo Time (ms)</label>
                      <input type="number" id="setting-comboTime" min="0" step="10">
                    </div>
                </div>
            </div>

            <!-- Speed Settings -->
             <div class="settings-section">
                <h3>Speed</h3>
                <div class="settings-grid">
                    <div class="settings-item">
                        <label for="setting-initialSpeed">Initial Speed (ms)</label>
                        <input type="number" id="setting-initialSpeed" min="100" step="50">
                    </div>
                    <div class="settings-item">
                        <label for="setting-speedIncrease">Speed Increase Rate (%)</label>
                        <input type="number" id="setting-speedIncrease" min="50" max="100" step="1" placeholder="e.g., 95">
                    </div>
                    <div class="settings-item">
                        <label for="setting-initialLockDelay">Initial Lock Delay (ms)</label>
                        <input type="number" id="setting-initialLockDelay" min="100" step="50">
                    </div>
                     <div class="settings-item">
                        <label for="setting-lockDelayDecrease">Lock Delay Decrease Rate (%)</label>
                        <input type="number" id="setting-lockDelayDecrease" min="50" max="100" step="1" placeholder="e.g., 95">
                    </div>
                </div>
            </div>

            <!-- Grid & Visuals Settings -->
            <div class="settings-section">
                <h3>Grid & Visuals</h3>
                 <p style="font-size: 0.8em; color: #aaa; text-align: center; margin-top: -10px; margin-bottom: 10px;">(Grid changes require restart)</p>
                <div class="settings-grid">
                    <div class="settings-item">
                        <label for="setting-phiSegments">Phi Segments (Angular)</label>
                        <input type="number" id="setting-phiSegments" min="12" max="48" step="1">
                    </div>
                    <div class="settings-item">
                        <label for="setting-rSegments">R Segments (Radial)</label>
                        <input type="number" id="setting-rSegments" min="10" max="30" step="1">
                    </div>
                    <div class="settings-item">
                         <label for="setting-holeColor">Central Hole Color</label>
                         <input type="color" id="setting-holeColor">
                     </div>
                     <div class="settings-item">
                         <label for="setting-outerColor">Outer Space Color</label>
                         <input type="color" id="setting-outerColor">
                     </div>
                     <!-- +++ NEW SETTING ITEM +++ -->
                     <div class="settings-item">
                        <label for="setting-lineClearDuration">Line Clear Effect Duration (ms)</label>
                        <input type="number" id="setting-lineClearDuration" min="50" step="10">
                    </div>
                    <!-- ++++++++++++++++++++++++ -->
                    <!-- +++ NEW: Game Mode Toggle +++ -->
                    <div class="settings-item">
                        <label for="setting-mode">Game Mode</label>
                        <select id="setting-mode">
                            <option value="circular">Circular (default)</option>
                            <option value="rectangular">Rectangular</option>
                            <option value="mobius">Möbius (3D)</option>
                        </select>
                    </div>
                    <!-- ++++++++++++++++++++++++++ -->
                    <!-- +++ NEW: Mobius Grid Opacity +++ -->
                    <div class="settings-item" id="setting-mobiusGridOpacity-item">
                        <label for="setting-mobiusGridOpacity">Möbius Grid Opacity (0.0 - 1.0)</label>
                        <input type="number" id="setting-mobiusGridOpacity" min="0" max="1" step="0.05">
                    </div>
                    <!-- ++++++++++++++++++++++++++++++++++ -->
                    <!-- +++ Rectangular Background Color +++ -->
                    <div class="settings-item">
                        <label for="setting-rectBgColor">Rectangular Background Color</label>
                        <input type="color" id="setting-rectBgColor">
                    </div>
                    <!-- ++++++++++++++++++++++++++++++++++ -->
                    <!-- +++ Drop Path Opacity +++ -->
                    <div class="settings-item">
                        <label for="setting-dropPathOpacity">Drop Path Opacity (0.0 - 1.0)</label>
                        <input type="number" id="setting-dropPathOpacity" min="0" max="1" step="0.05">
                    </div>
                    <!-- ++++++++++++++++++++++++ -->
                </div>
            </div>

             <!-- Controls Settings -->
            <div class="settings-section">
                <h3>Controls</h3>
                 <p style="font-size: 0.8em; color: #aaa; text-align: center; margin-top: -10px; margin-bottom: 10px;">(Click a key box to remap)</p>
                <div class="settings-grid" id="controls-remap-grid">
                    <!-- Control items will be generated by JS -->
                </div>
            </div>

            <!-- Actions -->
            <div class="settings-actions">
                <button id="settings-save" class="save">Save & Apply</button>
                <button id="settings-export">Export to File</button>
                <button id="settings-import">Import from File</button>
                 <button id="settings-reset">Reset Defaults</button> <!-- Keep Reset Defaults Button -->
                <button id="settings-cancel" class="cancel">Cancel</button>
            </div>
             <input type="file" id="settings-file-input" accept=".json" style="display: none;">
        </div>
    </div>


    <!-- Game Scripts (Tetromino definitions first) -->
    <script src="tetrominoes.js"></script>
    <script src="game.js"></script>
</body>
</html>
